# Work laptop dock profile.
# This file is sourced by ~/.config/hypr/hyprland.conf.

$workLaptopMonitor = desc:ASUSTek COMPUTER INC ASUS XG49V 0x00020793

# Keep the existing ultrawide geometry and laptop-panel scaling.
monitor = $workLaptopMonitor, 3840x1080@143.855, 0x0, 1
monitor = eDP-1, preferred, auto, 1.33

# Pin normal workspaces to the ultrawide so workspace switching changes the
# display being used while docked instead of the idle laptop panel.
workspace = 1, monitor:$workLaptopMonitor, default:true
workspace = 2, monitor:$workLaptopMonitor
workspace = 3, monitor:$workLaptopMonitor
workspace = 4, monitor:$workLaptopMonitor
workspace = 5, monitor:$workLaptopMonitor
workspace = 6, monitor:$workLaptopMonitor
workspace = 7, monitor:$workLaptopMonitor
workspace = 8, monitor:$workLaptopMonitor
workspace = 9, monitor:$workLaptopMonitor
workspace = 10, monitor:$workLaptopMonitor
workspace = special:scratchpad, monitor:$workLaptopMonitor

exec-once = $HOME/.local/bin/work-laptop-dockd
exec-once = $HOME/.local/bin/work-laptop-netd
