# User window rules overrides for Hyprland >= 0.53
# Vendor defaults are loaded from ~/.config/hypr/configs/WindowRules.conf
#
# Old pre-0.53 rules were backed up to:
# ~/.config/hypr/UserConfigs/WindowRules.conf.pre53-backup-20260221_001021
#
# Add custom rules here using v3 syntax, for example:
# windowrule = match:class ^(app)$, opacity 0.95

# App workspace placement overrides
# These route newly opened windows to target workspaces.
windowrule = match:class ^([Vv]ivaldi(-stable)?)$, workspace 2
windowrule = match:class ^([Dd]iscord|[Vv]esktop)$, workspace 10
windowrule = match:class ^([Ss]lack|com.slack.Slack)$, workspace 9

# Ferdium
windowrule = match:class ^([Ff]erdium)$, workspace 10
windowrule = match:class ^([Ff]erdium)$, fullscreen 2
windowrule = match:class ^([Ff]erdium)$, tile on
