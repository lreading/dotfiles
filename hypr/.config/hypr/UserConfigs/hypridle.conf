# User hypridle overrides.
# This file is launched from UserConfigs/Startup_Apps.conf so upgrade-owned
# ~/.config/hypr/hypridle.conf can change without bringing back idle popups.

general {
    lock_cmd = pidof hyprlock || hyprlock
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd = hyprctl dispatch dpms on
    ignore_dbus_inhibit = false
}

# Screenlock after 15 minutes. No idle/return notifications.
listener {
    timeout = 900
    on-timeout = loginctl lock-session
}
