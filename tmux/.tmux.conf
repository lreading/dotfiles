unbind r
bind r source-file ~/.tmux.conf

set -g prefix C-space

set -g mouse on
set-option -g renumber-windows on
set-option -g status-position top
set-option -sg escape-time 10
set-option -g focus-events on
#set -g default-terminal "xterm-256color:RGB,extkeys"
#set -g default-terminal "screen-256color"
set -g default-terminal "tmux-256color"
# set-option -a terminal-features 'xterm-256color:RGB,extkeys'
set -as terminal-features ',xterm-kitty:RBG,extkeys'
set-option -g base-index 1
set -g extended-keys on
set -g extended-keys-format csi-u
set -as terminal-features 'xterm-kitty:extkeys'



set -g history-file ~/.tmux_history
set -g history-limit 100000

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'

set -gF @catppuccin_custom_plugin_dir "#{E:HOME}/.config/tmux/catppuccin-custom"
set -g @catppuccin_window_status_style "custom"
set -g @catppuccin_window_left_separator "#[fg=#{@thm_surface_0},bg=default]"
set -g @catppuccin_window_right_separator "#[fg=#{@thm_blue},bg=default] "
set -g @catppuccin_window_middle_separator "#[fg=#{@thm_blue},bg=#{@thm_surface_0}] █"
set -g @catppuccin_window_current_left_separator "#[fg=#{@thm_bg},bg=default]"
set -g @catppuccin_window_current_right_separator "#[fg=#{@thm_green},bg=default] "
set -g @catppuccin_window_current_middle_separator "#[fg=#{@thm_green},bg=#{@thm_bg}] █"
set -g @catppuccin_window_number_position "right"

set -g @catppuccin_window_text "#W"
set -g @catppuccin_window_text_color "#{@thm_surface_0}"
set -g @catppuccin_window_number_color "#{@thm_blue}"
set -g @catppuccin_window_current_text "#W"
set -g @catppuccin_window_current_text_color "#{@thm_bg}"
set -g @catppuccin_window_current_number_color "#{@thm_green}"

set -g @catppuccin_status_left_separator  " "
set -g @catppuccin_status_right_separator ""
set -g @catppuccin_status_connect_separator "no"

set -g @catppuccin_directory_color "#{@thm_pink}"
set -g @catppuccin_directory_text " #{pane_current_path}"
set -g @catppuccin_status_directory_icon_fg "#{@thm_bg}"
set -g @catppuccin_status_session_icon_fg "#{@thm_bg}"
set -g @catppuccin_status_pub_ip_icon_fg "#{@thm_bg}"
set -g @catppuccin_status_priv_ip_icon_fg "#{@thm_bg}"

bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

set-option -g command-alias[10] setdir='attach -c "#{pane_current_path}"'
bind-key -T copy-mode-vi Y send-keys -X copy-pipe-and-cancel "wl-copy"

set -gu @catppuccin_status_directory
set -gu @catppuccin_status_directory_icon_bg
set -gu @catppuccin_status_session
set -gu @catppuccin_status_session_icon_bg

source-file ~/.tmux/plugins/tmux/catppuccin_options_tmux.conf
source-file ~/.tmux/plugins/tmux/catppuccin_tmux.conf

set -g window-status-format "#[fg=#{@thm_surface_0},bg=default]#[fg=#{@thm_fg},bg=#{@thm_surface_0}]#W#[fg=#{@thm_blue},bg=#{@thm_surface_0}] █#[fg=#{@thm_surface_0},bg=#{@thm_blue}]#I#[fg=#{@thm_blue},bg=default] "
set -g window-status-current-format "#[fg=#{@thm_bg},bg=default]#[fg=#{@thm_fg},bg=#{@thm_bg}]#W#[fg=#{@thm_green},bg=#{@thm_bg}] █#[fg=#{@thm_bg},bg=#{@thm_green}]#I#[fg=#{@thm_green},bg=default] "

source -F "#{E:HOME}/.config/tmux/catppuccin-custom/pub_ip.conf"
source -F "#{E:HOME}/.config/tmux/catppuccin-custom/priv_ip.conf"

set -g status-right "#{E:@catppuccin_status_pub_ip}#{E:@catppuccin_status_priv_ip}#{E:@catppuccin_status_directory}#{E:@catppuccin_status_session}"

set -g message-line 0
set -g message-style "fg=#89dceb,bg=#313244"
set -g message-command-style "fg=#89dceb,bg=#313244"

run '~/.tmux/plugins/tpm/tpm'

# Let Codex receive C-j as newline, while preserving vim-tmux-navigator behavior elsewhere.
unbind-key -n 'C-j'
bind-key -n 'C-j' if-shell "ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(codex|(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?)$'" \
  'send-keys C-j' \
  'select-pane -D'
