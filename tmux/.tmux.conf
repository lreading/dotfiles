unbind r
bind r source-file ~/.tmux.conf

set -g prefix C-space

set -g mouse on
set-option -g renumber-windows on
set-option -g status-position top
set-option -sg escape-time 10
set-option -g focus-events on
#set -g default-terminal "xterm-256color:RGB,extkeys"
set -g default-terminal "screen-256color"
set-option -a terminal-features 'xterm-256color:RGB,extkeys'
set-option -g base-index 1
set -g extended-keys on
set -g extended-keys-format csi-u
set -as terminal-features 'xterm-kitty:extkeys'



set -g history-file ~/.tmux_history
set -g history-limit 100000

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux#v0.3.0'
set -g @plugin 'christoomey/vim-tmux-navigator'

set -gF @catppuccin_custom_plugin_dir "#{E:HOME}/.config/tmux/catppuccin-custom"
set -g @catppuccin_window_left_separator ""
set -g @catppuccin_window_right_separator " "
set -g @catppuccin_window_middle_separator " █"
set -g @catppuccin_window_number_position "right"

set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_default_text "#W"

set -g @catppuccin_window_current_fill "number"
set -g @catppuccin_window_current_text "#W"

set -g @catppuccin_status_modules_right "pub_ip priv_ip directory session"
set -g @catppuccin_status_left_separator  " "
set -g @catppuccin_status_right_separator ""
set -g @catppuccin_status_fill "icon"
set -g @catppuccin_status_connect_separator "no"

set -g @catppuccin_directory_text "#{pane_current_path}"

set -g @catppuccin_window_current_color "#{thm_green}"

bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

set-option -g command-alias[10] setdir='attach -c "#{pane_current_path}"'
bind-key -T copy-mode-vi Y send-keys -X copy-pipe-and-cancel "wl-copy"

run '~/.tmux/plugins/tpm/tpm'

# Let Codex receive C-j as newline, while preserving vim-tmux-navigator behavior elsewhere.
unbind-key -n 'C-j'
bind-key -n 'C-j' if-shell "ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(codex|(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?)$'" \
  'send-keys C-j' \
  'select-pane -D'
